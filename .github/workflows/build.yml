name: Build Termux APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Debug APKs (all architectures)
        env:
          TERMUX_SPLIT_APKS_FOR_DEBUG_BUILDS: "1"
        run: ./gradlew assembleDebug --stacktrace

      - name: List built APKs
        run: ls -lh app/build/outputs/apk/debug/

      - name: Upload APK - arm64-v8a (64-bit ARM, most Android phones)
        uses: actions/upload-artifact@v4
        with:
          name: termuxmod-arm64-v8a
          path: app/build/outputs/apk/debug/*arm64-v8a*.apk
          if-no-files-found: warn

      - name: Upload APK - armeabi-v7a (32-bit ARM, older phones)
        uses: actions/upload-artifact@v4
        with:
          name: termuxmod-armeabi-v7a
          path: app/build/outputs/apk/debug/*armeabi-v7a*.apk
          if-no-files-found: warn

      - name: Upload APK - x86_64 (64-bit emulator / Chromebook)
        uses: actions/upload-artifact@v4
        with:
          name: termuxmod-x86_64
          path: app/build/outputs/apk/debug/*x86_64*.apk
          if-no-files-found: warn

      - name: Upload APK - x86 (32-bit emulator)
        uses: actions/upload-artifact@v4
        with:
          name: termuxmod-x86
          path: app/build/outputs/apk/debug/*x86*.apk
          if-no-files-found: warn

      - name: Upload APK - universal (semua arsitektur, ukuran lebih besar)
        uses: actions/upload-artifact@v4
        with:
          name: termuxmod-universal
          path: app/build/outputs/apk/debug/*universal*.apk
          if-no-files-found: warn
